<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexuStream Personal Device - VD</title>
    <style>
        /* Grundläggande nollställning och bakgrund */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Telefonens yttre ram */
        #phone-bezel {
            width: 320px;
            height: 650px;
            background-color: #000;
            border: 14px solid #333;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Statusraden högst upp (används bara på låsskärmen nu) */
        #status-bar {
            height: 24px;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- SKÄRM 1: LÅSSKÄRMEN --- */
        #lock-screen {
            flex-grow: 1;
            background-color: #0d0d0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #lock-message {
            color: #fff;
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
        }

        #pattern-holder {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 20px;
        }

        .pattern-dot {
            width: 20px;
            height: 20px;
            background-color: #555;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
        }

        .pattern-dot.selected {
            background-color: #ff3333;
            box-shadow: 0 0 10px #ff3333;
        }
        
        .pattern-dot::after {
            content: '';
            position: absolute;
            top: -20px; right: -20px; bottom: -20px; left: -20px;
            border-radius: 50%;
        }

        /* --- SKÄRM 2: HEMSKÄRMEN --- */
        #home-screen {
            display: none; /* Dold från start */
            width: 100%;
            height: 100%;
            background-image: url('phone1.jpg'); /* Laddar in din uppladdade skärmdump */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Osynliga klickbara ytor (Hitboxes) */
        .hitbox {
            position: absolute;
            cursor: pointer;
            /* TIPS: Avkommentera raden nedanför (ta bort /* och */) om du vill se var de osynliga knapparna ligger när du ställer in dem! */
            /* border: 2px solid red; background: rgba(255,0,0,0.3); */
        }

        /* Placering över SMS-ikonen (blå nere till vänster) */
        #btn-sms {
            bottom: 7.5%; 
            left: 27%;
            width: 17%;
            height: 8.5%;
            border-radius: 10px;
        }

        /* Placering över Galleri-ikonen (gul nere till höger) */
        #btn-gallery-dock {
            bottom: 7.5%; 
            right: 6%;
            width: 17%;
            height: 8.5%;
            border-radius: 10px;
        }

        /* Placering över "Photos"-ikonen (vindsnurran mitt på skärmen) */
        #btn-photos-app {
            bottom: 22.5%; 
            left: 52%;
            width: 16%;
            height: 8%;
            border-radius: 10px;
        }

    </style>
</head>
<body>

<div id="phone-bezel">
    
    <div id="status-bar">
        <span>NexuStream</span>
        <span id="current-time">--:--</span>
    </div>
    
    <div id="lock-screen">
        <div id="lock-message">Rita mönster för att låsa upp</div>
        
        <div id="pattern-holder">
            <div class="pattern-dot" data-index="1"></div>
            <div class="pattern-dot" data-index="2"></div>
            <div class="pattern-dot" data-index="3"></div>
            <div class="pattern-dot" data-index="4"></div>
            <div class="pattern-dot" data-index="5"></div>
            <div class="pattern-dot" data-index="6"></div>
            <div class="pattern-dot" data-index="7"></div>
            <div class="pattern-dot" data-index="8"></div>
            <div class="pattern-dot" data-index="9"></div>
        </div>
    </div>

    <div id="home-screen">
        <div id="btn-sms" class="hitbox" onclick="alert('Bra jobbat! Här ska vi snart bygga in SMS-listan.')"></div>
        <div id="btn-gallery-dock" class="hitbox" onclick="alert('Här ska bildgalleriet öppnas!')"></div>
        <div id="btn-photos-app" class="hitbox" onclick="alert('Här ska bildgalleriet öppnas!')"></div>
    </div>

</div>

<script>
    // 1. Klockan för låsskärmen
    function updateTime() {
        const now = new Date();
        document.getElementById('current-time').textContent = 
            now.getHours().toString().padStart(2, '0') + ':' + 
            now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 2. Mönsterlåset
    const correctPattern = ['1', '2', '3', '6', '9', '8', '7'];
    let currentPattern = [];
    let isDrawing = false;

    const dots = document.querySelectorAll('.pattern-dot');
    const lockScreen = document.getElementById('lock-screen');
    const lockMessage = document.getElementById('lock-message');

    function resetPattern() {
        dots.forEach(dot => dot.classList.remove('selected'));
        currentPattern = [];
    }

    function handleStart(e) {
        isDrawing = true;
        resetPattern();
        handleMove(e);
    }

    function handleMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const target = document.elementFromPoint(clientX, clientY);
        
        if (target && target.classList.contains('pattern-dot')) {
            const index = target.getAttribute('data-index');
            if (currentPattern.length === 0 || currentPattern[currentPattern.length - 1] !== index) {
                if (!target.classList.contains('selected')) {
                    target.classList.add('selected');
                    currentPattern.push(index);
                }
            }
        }
    }

    function handleEnd() {
        if (!isDrawing) return;
        isDrawing = false
