<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexuStream Personal Device - VD</title>
    <style>
        /* Grundläggande nollställning och bakgrund */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Förhindrar att skärmen scrollar när man drar mönstret */
        }

        /* Telefonens yttre ram */
        #phone-bezel {
            width: 320px;
            height: 650px;
            background-color: #000;
            border: 14px solid #333;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Statusraden högst upp */
        #status-bar {
            height: 24px;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            font-weight: bold;
        }

        /* Arbetsytan för skärmen */
        #display-area {
            flex-grow: 1;
            background-color: #0d0d0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Låsskärmens specifika stil */
        #lock-message {
            color: #fff;
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Rutnätet för punkterna */
        #pattern-holder {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 20px;
        }

        /* Själva punkterna */
        .pattern-dot {
            width: 20px;
            height: 20px;
            background-color: #555;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
        }

        /* Färg när en punkt är markerad (röd, som i loggan) */
        .pattern-dot.selected {
            background-color: #ff3333;
            box-shadow: 0 0 10px #ff3333;
        }
        
        /* En större osynlig "träffyta" runt punkten så det är lättare att träffa med fingret på mobil */
        .pattern-dot::after {
            content: '';
            position: absolute;
            top: -20px; right: -20px; bottom: -20px; left: -20px;
            border-radius: 50%;
        }

    </style>
</head>
<body>

<div id="phone-bezel">
    <div id="status-bar">
        <span>NexuStream</span>
        <span id="current-time">--:--</span>
    </div>
    
    <div id="display-area">
        <div id="lock-message">Rita mönster för att låsa upp</div>
        
        <div id="pattern-holder">
            <div class="pattern-dot" data-index="1"></div>
            <div class="pattern-dot" data-index="2"></div>
            <div class="pattern-dot" data-index="3"></div>
            <div class="pattern-dot" data-index="4"></div>
            <div class="pattern-dot" data-index="5"></div>
            <div class="pattern-dot" data-index="6"></div>
            <div class="pattern-dot" data-index="7"></div>
            <div class="pattern-dot" data-index="8"></div>
            <div class="pattern-dot" data-index="9"></div>
        </div>
    </div>
</div>

<script>
    // 1. Uppdatera klockan i statusraden
    function updateTime() {
        const now = new Date();
        document.getElementById('current-time').textContent = 
            now.getHours().toString().padStart(2, '0') + ':' + 
            now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 2. Logik för mönsterlåset
    const correctPattern = ['1', '2', '3', '6', '9', '8', '7']; // NexuStream-loggan!
    let currentPattern = [];
    let isDrawing = false;

    const dots = document.querySelectorAll('.pattern-dot');
    const lockScreen = document.getElementById('display-area'); // Hela skärmytan fångar drag-events
    const lockMessage = document.getElementById('lock-message');

    function resetPattern() {
        dots.forEach(dot => dot.classList.remove('selected'));
        currentPattern = [];
    }

    function handleStart(e) {
        isDrawing = true;
        resetPattern();
        handleMove(e); // Fånga första punkten man klickar på direkt
    }

    function handleMove(e) {
        if (!isDrawing) return;
        e.preventDefault(); // Stoppar telefonens inbyggda scroll
        
        // Hämta koordinater (hanterar både touch och datormus)
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;

        // Titta vad som finns under fingret/muspekaren
        const target = document.elementFromPoint(clientX, clientY);
        
        if (target && target.classList.contains('pattern-dot')) {
            const index = target.getAttribute('data-index');
            
            // Lägg till punkten i mönstret om vi inte redan lagt till den precis nyss
            if (currentPattern.length === 0 || currentPattern[currentPattern.length - 1] !== index) {
                if (!target.classList.contains('selected')) {
                    target.classList.add('selected');
                    currentPattern.push(index);
                }
            }
        }
    }

    function handleEnd() {
        if (!isDrawing) return;
        isDrawing = false;

        if (currentPattern.length === 0) return; // Gör inget om man bara klickat utanför

        // Kontrollera om mönstret är rätt!
        if (JSON.stringify(currentPattern) === JSON.stringify(correctPattern)) {
            lockMessage.textContent = "UPPLÅST!";
            lockMessage.style.color = "#4caf50"; // Grön färg
            // Här ska vi senare ladda in Hemskärmen!
        } else {
            lockMessage.textContent = "Fel mönster, försök igen";
            lockMessage.style.color = "#ff3333"; // Röd färg
            setTimeout(() => {
                resetPattern();
                lockMessage.textContent = "Rita mönster för att låsa upp";
                lockMessage.style.color = "#fff";
            }, 1000); // Vänta 1 sekund och återställ
        }
    }

    // Lyssnare för Datormus
    lockScreen.addEventListener('mousedown', handleStart);
    lockScreen.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    // Lyssnare för Touch (Mobiler)
    lockScreen.addEventListener('touchstart', handleStart, {passive: false});
    lockScreen.addEventListener('touchmove', handleMove, {passive: false});
    lockScreen.addEventListener('touchend', handleEnd);

</script>

</body>
</html>
